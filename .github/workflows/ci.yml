name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tiffinset_admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tiffinset
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run linting
        run: npm run lint --if-present
        
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: development
          DATABASE_URL: postgres://tiffinset_admin:password@localhost:5432/tiffinset
          REDIS_URL: redis://localhost:6379
          GEMINI_API_KEY: dummy-key
          WHISPER_API_KEY: dummy-key
          YOUTUBE_API_KEY: dummy-key
          TELEGRAM_BOT_TOKEN: dummy-key
